<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="shortcut icon" href="./assets/images/favicon-32x32.png" type="image/x-icon">
    <title>Frontend Mentor Social Links Profile</title>
</head>
<body>
    <main class="container">
        <figure class="user-profile">
            <img class="profile-pic" src="./assets/images/avatar-jessica.jpeg" alt="The image that the user selected as a profile picture.">
            <figcaption class="user-name">Jessica Randall</figcaption>
            <figcaption class="user-residence-city">London, United Kingdom</figcaption>
        </figure>
        <quote>Front-end developer and avid reader.</quote>
        <ul class="social-links-list">
            <li><a href="http://"><button type="button">GitHub</button></a></li>
            <li><a href="http://"><button type="button">Frontend Mentor</button></a></li>
            <li><a href="http://"><button type="button">LinkedIn</button></a></li>
            <li><a href="http://"><button type="button">Twitter</button></a></li>
            <li><a href="http://"><button type="button">Instagram</button></a></li>
        </ul>
    </main>
</body>
</html>
